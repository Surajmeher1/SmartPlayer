name: Release Windows Installer

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B clean package --file pom.xml

    # WiX Toolset is natively available on windows-latest GitHub Action runners
    - name: Run jpackage to build Windows Installer
      run: |
        $APP_VERSION = "${{ github.ref_name }}".TrimStart("v")
        jpackage `
          --type exe `
          --name SmartPlayer `
          --app-version $APP_VERSION `
          --vendor "Suraj Meher" `
          --description "A modern JavaFX + VLCJ desktop video player" `
          --input target/ `
          --main-jar smartplayer-1.0.0-shaded.jar `
          --main-class com.smartplayer.Launcher `
          --icon src/main/resources/icons/app.ico `
          --win-shortcut `
          --win-menu `
          --win-menu-group "SmartPlayer" `
          --win-dir-chooser `
          --win-per-user-install `
          --dest installer

    - name: Rename Installer
      run: |
        Move-Item -Path "installer\SmartPlayer-$APP_VERSION.exe" -Destination "installer\SmartPlayerSetup.exe" -ErrorAction SilentlyContinue

    - name: Release to GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: installer/SmartPlayerSetup.exe
        draft: false
        prerelease: false
        generate_release_notes: true
